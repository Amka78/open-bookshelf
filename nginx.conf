server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Expo static assets — cache aggressively (content-hashed filenames)
    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for health checks
    location = /healthz {
        access_log off;
        return 200 "ok";
    }
}
